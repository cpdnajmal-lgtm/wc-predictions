<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 My Stats - MIAC WC 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(180deg, #0a0a12 0%, #1a1020 40%, #0d0d1a 100%); color: #eee; padding: 15px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        h1 { text-align: center; margin-bottom: 8px; font-size: 1.6em; }
        .subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 20px; }
        .nav { text-align: center; margin-bottom: 25px; }
        .nav a { color: #ffd700; text-decoration: none; font-size: 0.9em; }
        .form-card { background: rgba(15,15,30,0.8); border: 1px solid #2a2a5e; border-radius: 14px; padding: 20px; }
        label { display: block; color: #00d4aa; font-weight: 700; margin-bottom: 8px; font-size: 0.85em; }
        select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2a2a5e; background: #0f0f23; color: #eee; font-size: 1.1em; margin-bottom: 16px; appearance: none; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #00d4aa, #00b894); color: #0f0f23; border: none; border-radius: 10px; font-weight: 800; font-size: 1.1em; cursor: pointer; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h1>📊 My Report Card</h1>
    <p class="subtitle">See your full tournament stats</p>
    <div class="nav"><a href="{{ url_for('home') }}">← Home</a></div>

    <form class="form-card" method="get" action="{{ url_for('my_stats') }}">
        <label>Select your name</label>
        <select name="player" required>
            <option value="">— Choose —</option>
            {% for player in players|sort %}
            <option value="{{ player }}">{{ player }}</option>
            {% endfor %}
        </select>
        <button type="submit">View My Stats →</button>
    </form>
</body>
</html>
