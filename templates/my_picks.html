<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 My Picks - MIAC WC 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0f0f23 100%); color: #eee; padding: 15px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        h1 { text-align: center; margin-bottom: 5px; font-size: 1.5em; }
        .subtitle { text-align: center; color: #555; margin-bottom: 20px; font-size: 0.85em; }
        .card { background: rgba(26,26,62,0.6); border-radius: 14px; padding: 20px; border: 1px solid #2a2a5e; }
        label { display: block; color: #00d4aa; font-weight: 600; margin-bottom: 6px; font-size: 0.9em; }
        select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #00d4aa; background: rgba(26,26,62,0.8); color: #eee; font-size: 1.1em; margin-bottom: 12px; }
        select:focus { outline: none; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2a2a5e; background: #0f0f23; color: #eee; font-size: 1em; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 25px; background: linear-gradient(135deg, #00d4aa, #00a88a); color: #0f0f23; font-size: 1.1em; font-weight: 700; cursor: pointer; }
        .back-link { display: block; text-align: center; color: #00d4aa; text-decoration: none; font-size: 0.9em; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>📋 My Picks</h1>
    <p class="subtitle">Check your predictions for tonight</p>

    <div class="card">
        <form method="POST">
            <label>Select your name</label>
            <input type="text" id="nameSearch" placeholder="🔍 Search..." oninput="filterNames()">
            <select name="player" id="playerSelect" required>
                <option value="">-- Select --</option>
                {% for player in players %}
                <option value="{{ player }}">{{ player }}</option>
                {% endfor %}
            </select>
            <button type="submit">View My Predictions</button>
        </form>
    </div>

    <a href="{{ url_for('home') }}" class="back-link">← Back to Home</a>

    <script>
    function filterNames() {
        var search = document.getElementById('nameSearch').value.toLowerCase();
        var select = document.getElementById('playerSelect');
        for (var i = 0; i < select.options.length; i++) {
            var opt = select.options[i];
            if (opt.value === '') { opt.style.display = ''; }
            else { opt.style.display = opt.text.toLowerCase().includes(search) ? '' : 'none'; }
        }
    }
    </script>
</body>
</html>
